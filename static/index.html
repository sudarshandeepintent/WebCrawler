<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Crawler</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --err: #f87171;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 52rem; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    input[type="url"] {
      flex: 1 1 14rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #2d3a4d;
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 1rem;
    }
    input[type="url"]::placeholder { color: var(--muted); }
    button {
      padding: 0.6rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .banner {
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .banner.show { display: block; }
    .banner.err { background: #3f1d1d; color: var(--err); border: 1px solid #7f2d2d; }
    .banner.ok { background: #14261a; color: var(--ok); border: 1px solid #225c32; }
    .out {
      background: var(--panel);
      border: 1px solid #2d3a4d;
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.82rem;
      overflow: auto;
      max-height: 70vh;
    }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    footer { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Web Crawler</h1>
    <p class="sub">Paste a URL — same as <code>POST /crawl</code>. API docs: <a href="/docs">/docs</a></p>

    <div id="msg" class="banner" role="status"></div>

    <form id="f">
      <input type="url" name="url" placeholder="https://example.com" required autocomplete="url" />
      <button type="submit" id="go">Crawl</button>
    </form>

    <div class="out"><pre id="out">{}</pre></div>

    <footer>Health: <a href="/health">/health</a></footer>
  </div>
  <script>
    const f = document.getElementById("f");
    const go = document.getElementById("go");
    const out = document.getElementById("out");
    const msg = document.getElementById("msg");

    function showMsg(text, ok) {
      msg.textContent = text;
      msg.className = "banner show " + (ok ? "ok" : "err");
    }
    function hideMsg() {
      msg.className = "banner";
      msg.textContent = "";
    }

    f.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideMsg();
      const url = new FormData(f).get("url");
      go.disabled = true;
      out.textContent = "…";
      try {
        const r = await fetch("/crawl", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          const detail = data.detail != null ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail)) : r.statusText;
          showMsg(detail || "Request failed", false);
          out.textContent = JSON.stringify(data, null, 2);
          return;
        }
        showMsg("OK — " + (data.final_url || url), true);
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        showMsg(String(err), false);
        out.textContent = "{}";
      } finally {
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
